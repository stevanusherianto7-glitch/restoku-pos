name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
        coverage: none

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Copy .env file
      run: cp .env.example .env

    - name: Install Composer dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Install npm dependencies
      run: npm ci

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Create database file
      run: touch database/database.sqlite

    - name: Run Database Migrations and Seeders
      run: php artisan migrate --force --seed

    - name: Compile frontend assets
      run: npm run build

    - name: Install Playwright browsers and dependencies
      run: npx playwright install --with-deps

    - name: Start Laravel local server
      run: |
        php artisan serve --port=8000 &
        sleep 3

    - name: Run Linters, Backend & Route Verification Tests (TDR)
      run: npm run tdr:e2e

    - name: Run Playwright E2E Tests
      run: npm run test:pw

    - name: Upload Playwright report on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
