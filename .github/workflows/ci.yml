name: CI — Restoku Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Backend PHPUnit — 51 tests / 124 assertions
  # ─────────────────────────────────────────────────────────────
  phpunit:
    name: "PHPUnit (51 tests)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download Vite build artifact
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: public/build/

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare CI environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/logs
          php artisan migrate --force

      - name: Run PHPUnit (php artisan test)
        run: php artisan test --stop-on-failure

      - name: Run PHPStan (Larastan) static analysis
        run: ./vendor/bin/phpstan analyse

  # ─────────────────────────────────────────────────────────────
  # Job 2: Frontend Vitest — 38 unit tests
  # ─────────────────────────────────────────────────────────────
  vitest:
    name: "Vitest (38 unit tests)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint code check
        run: npm run lint

      - name: Run Vitest (npm test)
        run: npm test
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1

  # ─────────────────────────────────────────────────────────────
  # Job 3: Vite Production Build — 2417 modules
  # ─────────────────────────────────────────────────────────────
  build:
    name: "Vite Build (production)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend assets
        run: npm run build

      - name: Upload Vite build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: public/build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 4: Playwright E2E — 26 specs x 4 browsers = 104 runs
  # Runs after all other jobs pass
  # ─────────────────────────────────────────────────────────────
  playwright:
    name: "Playwright (${{ matrix.browser }})"
    runs-on: ubuntu-latest
    needs: [phpunit, vitest, build]

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit, "Mobile Chrome"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Prepare CI environment
        run: |
          cp .env.example .env
          sed -i 's/SESSION_DRIVER=database/SESSION_DRIVER=file/' .env
          sed -i 's/CACHE_STORE=database/CACHE_STORE=file/' .env
          sed -i 's|APP_URL=http://localhost$|APP_URL=http://localhost:8000|' .env
          touch database/database.sqlite
          mkdir -p storage/framework/views
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/logs
          php artisan key:generate
          php artisan migrate --force --seed

      - name: Download Vite build artifact
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: public/build/

      - name: Install Playwright browser — ${{ matrix.browser }}
        run: |
          BROWSER="${{ matrix.browser }}"
          if [ "$BROWSER" = "Mobile Chrome" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install --with-deps "$BROWSER"
          fi

      - name: Start Laravel server
        run: |
          php artisan serve --host=0.0.0.0 --port=8000 &
          echo "Waiting for server..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8000 > /dev/null 2>&1; then
              echo "Server up!"
              break
            fi
            echo "[$i/20] Not ready yet..."
            echo "--- DEBUG SERV ---"
            curl -i http://127.0.0.1:8000/ || true
            echo "------------------"
            sleep 3
          done

      - name: "E2E HTTP Route Check (61 endpoints)"
        run: npm run test:e2e -- --base-url http://127.0.0.1:8000

      - name: "Playwright E2E — ${{ matrix.browser }}"
        run: npx playwright test --project="${{ matrix.browser }}"
        env:
          CI: true

      - name: "Upload Playwright report — ${{ matrix.browser }}"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "playwright-report-${{ matrix.browser }}"
          path: playwright-report/
          retention-days: 14

      - name: "Print Laravel log on failure"
        if: failure()
        run: |
          if [ -f storage/logs/laravel.log ]; then
            cat storage/logs/laravel.log
          fi

